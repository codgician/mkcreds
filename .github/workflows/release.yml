name: Release
on:
  push:
    tags:
      - "v*"
permissions:
  contents: write
jobs:
  wait-for-build:
    name: Wait for Build
    runs-on: ubuntu-latest
    steps:
      - name: Wait for build workflow
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ github.sha }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          check-name: Build (x86_64-linux)
          wait-interval: 10
      - name: Wait for aarch64 build
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ github.sha }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          check-name: Build (aarch64-linux)
          wait-interval: 10
  release:
    name: Create Release
    needs: wait-for-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Download artifacts from build workflow
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: build.yml
          commit: ${{ github.sha }}
          path: artifacts
      - name: Prepare release assets
        run: |
          mkdir -p release
          for dir in artifacts/*/; do
            name=$(basename "$dir")
            cp "$dir/mkcreds" "release/$name"
            chmod +x "release/$name"
          done
          cd release
          for file in mkcreds-*; do
            sha256sum "$file" > "$file.sha256"
          done
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/mkcreds-x86_64-linux
            release/mkcreds-x86_64-linux.sha256
            release/mkcreds-aarch64-linux
            release/mkcreds-aarch64-linux.sha256
