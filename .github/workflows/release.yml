name: Release
on:
  push:
    tags:
      - "v*"
permissions:
  contents: write
  actions: read
jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Wait for build workflow to succeed
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Waiting for Build workflow on commit ${{ github.sha }}..."
          # Wait up to 30 minutes for build to complete
          for i in {1..180}; do
            # Get the most recent Build workflow run for this commit
            run_info=$(gh run list --workflow=build.yml --commit=${{ github.sha }} --json status,conclusion,databaseId --limit=1)
            status=$(echo "$run_info" | jq -r '.[0].status // "not_found"')
            conclusion=$(echo "$run_info" | jq -r '.[0].conclusion // "none"')
            run_id=$(echo "$run_info" | jq -r '.[0].databaseId // "none"')

            echo "Attempt $i: status=$status, conclusion=$conclusion, run_id=$run_id"

            if [ "$status" = "completed" ]; then
              if [ "$conclusion" = "success" ]; then
                echo "Build workflow succeeded!"
                exit 0
              else
                echo "Build workflow failed with conclusion: $conclusion"
                exit 1
              fi
            fi

            if [ "$status" = "not_found" ]; then
              echo "Build workflow not found yet, waiting..."
            fi

            sleep 10
          done
          echo "Timeout waiting for build workflow"
          exit 1
      - name: Download artifacts from build workflow
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: build.yml
          commit: ${{ github.sha }}
          path: artifacts
      - name: Prepare release assets
        run: |
          mkdir -p release
          for dir in artifacts/*/; do
            name=$(basename "$dir")
            cp "$dir/mkcreds" "release/$name"
            chmod +x "release/$name"
          done
          cd release
          for file in mkcreds-*; do
            sha256sum "$file" > "$file.sha256"
          done
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/mkcreds-x86_64-linux
            release/mkcreds-x86_64-linux.sha256
            release/mkcreds-aarch64-linux
            release/mkcreds-aarch64-linux.sha256
